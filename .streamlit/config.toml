[theme]
base = "dark"
primaryColor = "#F5C518"
backgroundColor = "#081710"
secondaryBackgroundColor = "#10281A"
textColor = "#F2EDDD"
font = "sans serif"

[server]
headless = true
# NOTE: enableCORS = false was removed — it contradicts enableXsrfProtection,
# which Streamlit resolves by ignoring the CORS setting and warning on boot.
enableXsrfProtection = true
